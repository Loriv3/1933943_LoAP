server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:/data/rules.db
    driver-class-name: org.sqlite.JDBC

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  artemis:
    broker-url: tcp://activemq:61616
    user: admin
    password: admin

app:
  jms:
    topicState: sensor.events
    queueCommands: actuator.commands
    queueActuatorStates: actuator.commands
    topicRuleFired: marsops.rules.fired

logging:
  level:
    root: INFO
    marsops.automation: INFO
